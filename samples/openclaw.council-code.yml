# Council-Code Profile for 오픈클로 (OpenClaw)
# AI 에이전트 오케스트레이션 시스템

name: "openclaw"
type: "automation-system"
description: "LaunchAgent 기반 자동화 시스템, MCP, 이미지 생성 파이프라인 포함."

# 항상 참여하는 기본 페르소나 (4명)
base_personas:
  - engineer           # Python/TS 혼합, 시스템 통합
  - devops             # LaunchAgent, cron, 장시간 실행
  - security           # credentials/, 자동 실행 권한
  - devils-advocate    # 자동화의 과잉 설계 경계

# 강제 추가 (credentials/ 디렉토리 존재)
forced_personas:
  - security           # 시크릿 관리 타협 불가

# 기본 제외
excluded_personas:
  - designer           # UI 없음 (백엔드 시스템)
  - user               # 엔드유저 없음 (개발자가 운영자)

# 키워드별 추가 페르소나
keyword_additions:
  "새 에이전트|LLM|프롬프트": [devils-advocate, pm]
  "배포|launchctl|launchd|cron": [devops]
  "권한|sudo|credentials|토큰": [security]
  "성능|병렬|속도|큐": [performance]
  "MCP|서버|프로토콜": [engineer, security]
  "비용|API|호출량|토큰 사용": [pm, performance]

# 프로젝트 컨텍스트
context: |
  - 성격: 개인 자동화 허브 (운영자 = 개발자 본인)
  - 실행 환경: macOS LaunchAgent, 장시간 백그라운드 실행
  - 보안 민감: credentials/에 API 키, OAuth 토큰 보관
  - 제약: Chrome Remote Desktop 보호 필수 (pkill Chrome 금지)
  - 철학: 자동화는 되돌릴 수 있어야 함 (무한 루프/리소스 폭주 방지)
  - 주의: 새 에이전트 추가 시 기존과 역할 중복 검증 필수

# 원탁 모드 기본값
defaults:
  mode: "standard"
  rounds: 4
  max_retries: 3       # 자동화는 신중하게

# 자동 트리거 (추가 고려)
auto_trigger_on:
  - "새 에이전트 추가"
  - "LaunchAgent 변경"
  - "credentials/ 수정"
  - "자동 실행 경로 변경"
